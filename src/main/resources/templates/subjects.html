<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>My Subjects - PTMS</title>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: Arial; background: white; color: black; } nav { background: black; padding: 0 24px; display: flex; align-items: center; height: 52px; } nav .brand { font-size: 17px; font-weight: bold; color: white; margin-right: 28px; } nav a { color: #ccc; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; } nav a:hover { background: #333; color: white; } .page-header { display: flex; align-items: center; justify-content: space-between; margin: 24px 28px 16px; } .page-header h1 { font-size: 20px; } .info-box { margin: 0 28px 16px; padding: 11px 16px; border-radius: 5px; font-size: 13px; border-left: 4px solid black; background: #f9f9f9; color: #555; } .table-wrap { margin: 0 28px; border-radius: 8px; border: 1px solid black; overflow: hidden; } table { width: 100%; border-collapse: collapse; } thead tr { background: black; } thead th { color: white; padding: 12px 16px; text-align: left; font-size: 13px; } tbody td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #ddd; } tbody tr:hover td { background: #f5f5f5; } tbody tr:last-child td { border-bottom: none; } .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: bold; background: black; color: white; } .empty-td { text-align: center; color: #aaa; padding: 28px !important; font-style: italic; }</style>
</head>
<body>
<nav>
  <span class="brand">&#127979; PTMS</span>
  <a th:href="@{/dashboard}">Home</a>
  <a th:href="@{/students}">My Students</a>
  <a th:href="@{/logout}" style="margin-left:auto;color:#ff6b6b;">Sign Out</a>
</nav>
<div class="page-header">
  <h1>&#128218; My Subjects</h1>
</div>
<div class="info-box">
  These are the subjects assigned to you by the administrator. To request changes contact your administrator.
</div>
<div class="table-wrap"><table>
  <thead><tr><th>ID</th><th>Subject Name</th><th>Class</th></tr></thead>
  <tbody>
  <tr th:each="sub : ${subjects}">
    <td><span class="badge" th:text="${sub.subjectId}"></span></td>
    <td th:text="${sub.subjectName}"></td>
    <td th:text="${sub.className}"></td>
  </tr>
  <tr th:if="${#lists.isEmpty(subjects)}">
    <td colspan="3" class="empty-td">No subjects assigned yet. Contact your administrator.</td>
  </tr>
  </tbody>
</table></div>
</body></html>
