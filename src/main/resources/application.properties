# ?? Server ??????????????????????????????????????????????
server.port=8080

# ?? SQLite DataSource (local development only) ??????????
spring.datasource.url=jdbc:sqlite:ptms.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.jdbc-url=jdbc:sqlite:ptms.db

# ?? Disable Spring SQL init (we use DatabaseInitializer) ?
spring.sql.init.mode=never

# ?? Logging ?????????????????????????????????????????????
logging.level.za.ac.tut=DEBUG

# ?? Admin credentials ????????????????????????????????????
admin.username=admin
admin.password=admin123