# ── Server ──────────────────────────────────────────────
server.port=8080

# ── SQLite DataSource ────────────────────────────────────
spring.datasource.url=jdbc:sqlite:${user.home}/ptms.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# SQLite only allows one writer at a time — keep pool size at 1
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-test-query=SELECT 1

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

spring.datasource.hikari.jdbc-url=jdbc:sqlite:ptms.db

# ── Logging ──────────────────────────────────────────────
logging.level.za.ac.tut=DEBUG

# ── Admin credentials (change these before deploying) ────────────────────────
admin.username=admin
admin.password=admin123

