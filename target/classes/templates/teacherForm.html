<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8">
<title th:text="${teacher == null ? 'Add Teacher' : 'Edit Teacher'}">Teacher Form</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: white; color: black; }
nav { background: black; padding: 0 24px; display: flex; align-items: center; height: 52px; }
nav .brand { font-size: 17px; font-weight: bold; color: white; margin-right: 28px; }
nav a { color: #ccc; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; }
nav a:hover { background: #333; color: white; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin: 24px 28px 20px; }
.page-header h1 { font-size: 20px; color: black; }
.btn { display: inline-block; padding: 8px 18px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; text-decoration: none; }
.btn-success { background: black; color: white; }
.btn-secondary { background: white; color: black; border: 1px solid black; }
.btn:hover { opacity: 0.75; }
.form-wrap { margin: 0 28px; }
.form-card { background: white; border-radius: 8px; padding: 32px 36px; max-width: 560px; border: 1px solid black; }
.form-card h2 { font-size: 15px; color: black; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid black; }
.form-group { margin-bottom: 18px; }
.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }
label { display: block; font-size: 12px; font-weight: bold; color: black; margin-bottom: 6px; text-transform: uppercase; }
input[type=text], input[type=email], input[type=password] { width: 100%; padding: 9px 12px; border: 1px solid black; border-radius: 5px; font-size: 14px; background: white; color: black; }
input:focus { outline: none; border-color: #555; }
.form-actions { margin-top: 24px; display: flex; gap: 10px; }
.hint { font-size: 11px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<nav>
  <span class="brand">&#127979; Parent Teacher Management System</span>
  <a th:href="@{/dashboard}">Home</a>
  <a th:href="@{/students}">Students</a>
  <a th:href="@{/teachers}">Teachers</a>
  <a th:href="@{/meetings}">Meetings</a>
</nav>
<div class="page-header">
  <h1 th:text="${teacher == null ? '&#128218; Add Teacher' : '&#128218; Edit Teacher'}">Teacher</h1>
  <a th:href="@{/teachers}" class="btn btn-secondary">&#8592; Back</a>
</div>
<div class="form-wrap">
<div class="form-card">
  <h2 th:text="${teacher == null ? 'Enter Teacher Details' : 'Update Teacher Details'}"></h2>
  <form th:action="@{/teachers}" method="post">
    <input type="hidden" name="action"    th:value="${teacher != null ? 'update' : 'insert'}">
    <input type="hidden" name="teacherId" th:if="${teacher != null}" th:value="${teacher.teacherId}">
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="name" th:value="${teacher?.name}" placeholder="e.g. John" required>
      </div>
      <div class="form-group">
        <label>Surname</label>
        <input type="text" name="surname" th:value="${teacher?.surname}" placeholder="e.g. Smith" required>
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" th:value="${teacher?.email}" placeholder="e.g. john@school.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password"
             th:placeholder="${teacher != null ? 'Leave blank to keep current' : 'Password'}"
             th:required="${teacher == null}">
      <p class="hint" th:if="${teacher != null}">Leave blank to keep the existing password.</p>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-success"
              th:text="${teacher == null ? '&#10003; Add Teacher' : '&#10003; Update Teacher'}"></button>
      <a th:href="@{/teachers}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
</div>
</body>
</html>
