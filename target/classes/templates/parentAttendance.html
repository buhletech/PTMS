<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Attendance - PTMS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial; background: white; color: black; }
        nav { background: black; padding: 0 24px; display: flex; align-items: center; height: 52px; }
        nav .brand { font-size: 17px; font-weight: bold; color: white; margin-right: 28px; }
        nav a { color: #ccc; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; }
        nav a:hover { background: #333; color: white; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin: 24px 28px 20px; }
        .page-header h1 { font-size: 20px; }
        .btn { display: inline-block; padding: 8px 18px; border-radius: 4px; font-size: 13px; font-weight: bold; text-decoration: none; }
        .btn-secondary { background: white; color: black; border: 1px solid black; }
        .btn:hover { opacity: 0.75; }
        .student-banner { margin: 0 28px 20px; background: #f0f0f0; border: 1px solid black; border-radius: 8px; padding: 18px 22px; display: flex; align-items: center; gap: 14px; }
        .student-banner .icon { font-size: 36px; }
        .student-banner .name { font-size: 18px; font-weight: bold; }
        .student-banner .info { font-size: 13px; color: #555; margin-top: 3px; }
        .table-wrap { margin: 0 28px; border-radius: 8px; border: 1px solid black; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: black; }
        thead th { color: white; padding: 12px 16px; text-align: left; font-size: 13px; }
        tbody td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #ddd; }
        tbody tr:hover td { background: #f5f5f5; }
        tbody tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; }
        .badge-present { background: #2dc653; }
        .badge-absent  { background: #e63946; }
        .badge-late    { background: #f4a261; color: black; }
        .empty-td { text-align: center; color: #aaa; padding: 28px !important; font-style: italic; }
        .summary { margin: 0 28px 20px; display: flex; gap: 16px; flex-wrap: wrap; }
        .summary-card { background: white; border: 1px solid black; border-radius: 8px; padding: 16px 24px; text-align: center; flex: 1; min-width: 120px; }
        .summary-card .count { font-size: 28px; font-weight: bold; }
        .summary-card .label { font-size: 12px; color: #555; margin-top: 4px; }
        .count-present { color: #2dc653; }
        .count-absent  { color: #e63946; }
        .count-late    { color: #f4a261; }
    </style>
</head>
<body>
<nav>
    <span class="brand">&#127979; PTMS</span>
    <a th:href="@{/dashboard}">Home</a>
    <a th:href="@{/parent/children}">My Children</a>
    <a th:href="@{/logout}" style="margin-left:auto;color:#ff6b6b;">Sign Out</a>
</nav>
<div class="page-header">
    <h1>&#128203; Attendance</h1>
    <a th:href="@{/parent/children}" class="btn btn-secondary">&#8592; Back</a>
</div>

<div class="student-banner">
    <div class="icon">&#127891;</div>
    <div>
        <div class="name" th:text="${student.name + ' ' + student.surname}"></div>
        <div class="info" th:text="'Grade ' + ${student.grade} + ' — ' + ${student.className}"></div>
    </div>
</div>

<!-- Summary counts -->
<div class="summary" th:if="${not #lists.isEmpty(attendanceList)}">
    <div class="summary-card">
        <div class="count count-present"
             th:text="${#lists.size(attendanceList.?[status == 'Present'])}">0</div>
        <div class="label">Present</div>
    </div>
    <div class="summary-card">
        <div class="count count-absent"
             th:text="${#lists.size(attendanceList.?[status == 'Absent'])}">0</div>
        <div class="label">Absent</div>
    </div>
    <div class="summary-card">
        <div class="count count-late"
             th:text="${#lists.size(attendanceList.?[status == 'Late'])}">0</div>
        <div class="label">Late</div>
    </div>
    <div class="summary-card">
        <div class="count" th:text="${#lists.size(attendanceList)}">0</div>
        <div class="label">Total Records</div>
    </div>
</div>

<div class="table-wrap"><table>
    <thead>
    <tr><th>Date</th><th>Subject</th><th>Status</th></tr>
    </thead>
    <tbody>
    <tr th:each="a : ${attendanceList}">
        <td th:text="${a.date}"></td>
        <td th:text="${a.subjectName}"></td>
        <td>
            <span th:if="${a.status == 'Present'}" class="badge badge-present">Present</span>
            <span th:if="${a.status == 'Absent'}"  class="badge badge-absent">Absent</span>
            <span th:if="${a.status == 'Late'}"    class="badge badge-late">Late</span>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(attendanceList)}">
        <td colspan="3" class="empty-td">No attendance records found for this student.</td>
    </tr>
    </tbody>
</table></div>
</body></html>
