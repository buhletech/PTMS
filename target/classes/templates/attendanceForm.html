<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Record Attendance - PTMS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: white; color: black; }
    nav { background: black; padding: 0 24px; display: flex; align-items: center; height: 52px; }
    nav .brand { font-size: 17px; font-weight: bold; color: white; margin-right: 28px; }
    nav a { color: #ccc; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; }
    nav a:hover { background: #333; color: white; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin: 24px 28px 20px; }
    .page-header h1 { font-size: 20px; }
    .btn { display: inline-block; padding: 8px 18px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; text-decoration: none; }
    .btn-success { background: black; color: white; }
    .btn-secondary { background: white; color: black; border: 1px solid black; }
    .btn:hover { opacity: 0.75; }
    .form-wrap { margin: 0 28px; }
    .form-card { background: white; border-radius: 8px; padding: 32px 36px; max-width: 480px; border: 1px solid black; }
    .form-card h2 { font-size: 15px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid black; }
    .student-banner { background: #f0f0f0; border: 1px solid black; border-radius: 6px; padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .student-banner .icon { font-size: 24px; }
    .student-banner .name { font-size: 16px; font-weight: bold; }
    .student-banner .grade { font-size: 12px; color: #555; }
    .form-group { margin-bottom: 18px; }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }
    label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
    input, select { width: 100%; padding: 9px 12px; border: 1px solid black; border-radius: 5px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #555; }
    .form-actions { margin-top: 24px; display: flex; gap: 10px; }
  </style>
</head>
<body>
<nav>
  <span class="brand">&#127979; PTMS</span>
  <a th:href="@{/dashboard}">Home</a>
  <a th:href="@{/attendance}">Attendance</a>
</nav>
<div class="page-header">
  <h1>&#128203; Record Attendance</h1>
  <a th:href="@{/attendance(classId=${selectedClassId})}" class="btn btn-secondary">&#8592; Back</a>
</div>
<div class="form-wrap"><div class="form-card">
  <h2 th:text="${attendance == null ? 'Record Attendance' : 'Update Attendance'}"></h2>

  <!-- Student Banner -->
  <div class="student-banner" th:if="${preStudent != null}">
    <div class="icon">&#127891;</div>
    <div>
      <div class="name" th:text="${preStudent.name + ' ' + preStudent.surname}"></div>
      <div class="grade" th:text="'Grade ' + ${preStudent.grade} + ' — ' + ${preStudent.className}"></div>
    </div>
  </div>
  <div class="student-banner" th:if="${attendance != null}">
    <div class="icon">&#127891;</div>
    <div>
      <div class="name" th:text="${attendance.studentName}"></div>
      <div class="grade" th:text="${attendance.subjectName}"></div>
    </div>
  </div>

  <form th:action="@{/attendance}" method="post">
    <input type="hidden" name="action"       th:value="${attendance != null ? 'update' : 'insert'}">
    <input type="hidden" name="attendanceId" th:if="${attendance != null}" th:value="${attendance.attendanceId}">
    <input type="hidden" name="classId"      th:value="${selectedClassId}">
    <input type="hidden" name="studentId"
           th:value="${preStudent != null ? preStudent.studentId : attendance?.studentId}">

    <!-- Subject — pre-filtered to teacher's subjects for this class -->
    <div class="form-group">
      <label>Subject</label>
      <select name="subjectId" required>
        <option value="">-- Select Subject --</option>
        <option th:each="s : ${subjects}"
                th:value="${s.subjectId}"
                th:text="${s.subjectName}"
                th:selected="${attendance != null && attendance.subjectId == s.subjectId}">
        </option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date"
               th:value="${attendance?.date}" required>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status" required>
          <option value="">-- Select --</option>
          <option value="Present" th:selected="${attendance != null && attendance.status == 'Present'}">Present</option>
          <option value="Absent"  th:selected="${attendance != null && attendance.status == 'Absent'}">Absent</option>
          <option value="Late"    th:selected="${attendance != null && attendance.status == 'Late'}">Late</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-success"
              th:text="${attendance == null ? '&#10003; Record' : '&#10003; Update'}"></button>
      <a th:href="@{/attendance(classId=${selectedClassId})}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div></div>
</body></html>
